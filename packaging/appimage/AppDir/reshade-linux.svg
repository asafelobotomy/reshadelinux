<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768" role="img" aria-labelledby="title desc">
  <title id="title">ReShade Steam logo</title>
  <desc id="desc">Blue square logo for ReShade Steam with large RS lettering, a Steam-style cloud outline, a controller and gear motif, and the words ReShade Steam.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b5378"/>
      <stop offset="100%" stop-color="#163754"/>
    </linearGradient>
    <linearGradient id="ivory" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e1d9"/>
      <stop offset="100%" stop-color="#c8c0b8"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d49e7f"/>
      <stop offset="100%" stop-color="#a87356"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0d2336" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="768" height="768" fill="url(#bg)"/>
  <rect x="18" y="18" width="732" height="732" fill="none" stroke="#d7d0c8" stroke-width="8"/>

  <g filter="url(#shadow)">
    <text x="152" y="432" fill="url(#ivory)" font-family="DejaVu Sans, Trebuchet MS, Arial, sans-serif" font-size="286" font-weight="800" letter-spacing="-24">RS</text>

    <path d="M525 104c29 0 54 18 64 45c28 3 50 27 50 56c0 33-27 59-60 59h-8c-11 27-36 47-66 52" fill="none" stroke="#d7d0c8" stroke-linecap="round" stroke-linejoin="round" stroke-width="11"/>
    <path d="M520 247c10-17 17-37 18-58" fill="none" stroke="#d7d0c8" stroke-linecap="round" stroke-width="11"/>
    <path d="M483 161c-10-24-34-41-61-41c-37 0-67 30-67 67c0 37 30 67 67 67c11 0 21-2 30-7" fill="none" stroke="#d7d0c8" stroke-linecap="round" stroke-linejoin="round" stroke-width="11"/>
    <path d="M580 187c-4 14-8 25-15 39" fill="none" stroke="#d7d0c8" stroke-linecap="round" stroke-width="11"/>

    <g transform="translate(149 398)">
      <rect x="0" y="6" width="18" height="132" rx="9" fill="#d7d0c8"/>
      <rect x="40" y="61" width="86" height="18" rx="9" fill="#d7d0c8"/>
      <rect x="118" y="38" width="93" height="43" rx="12" fill="url(#ivory)"/>
      <rect x="172" y="18" width="20" height="55" rx="8" fill="#d7d0c8"/>
      <rect x="150" y="27" width="63" height="14" rx="7" fill="#d7d0c8"/>
      <g transform="translate(206 24)">
        <circle cx="55" cy="71" r="46" fill="url(#copper)"/>
        <circle cx="55" cy="71" r="23" fill="url(#bg)"/>
        <circle cx="55" cy="71" r="10" fill="url(#copper)"/>
        <g fill="url(#copper)">
          <rect x="49" y="-2" width="12" height="30" rx="4"/>
          <rect x="49" y="114" width="12" height="30" rx="4"/>
          <rect x="-2" y="65" width="30" height="12" rx="4"/>
          <rect x="82" y="65" width="30" height="12" rx="4"/>
          <rect x="10" y="18" width="12" height="28" rx="4" transform="rotate(-45 16 32)"/>
          <rect x="88" y="18" width="12" height="28" rx="4" transform="rotate(45 94 32)"/>
          <rect x="10" y="96" width="12" height="28" rx="4" transform="rotate(45 16 110)"/>
          <rect x="88" y="96" width="12" height="28" rx="4" transform="rotate(-45 94 110)"/>
        </g>
      </g>
    </g>

    <text x="130" y="636" fill="url(#ivory)" font-family="DejaVu Sans, Trebuchet MS, Arial, sans-serif" font-size="114" font-weight="800" letter-spacing="-3">ReShade</text>
    <text x="262" y="706" fill="url(#copper)" font-family="DejaVu Sans, Trebuchet MS, Arial, sans-serif" font-size="72" font-weight="700" letter-spacing="7">STEAM</text>
  </g>
</svg>