name: Build and release AppImage

# Trigger on version tags (e.g. v1.0.0) or a manual run.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create (e.g. v1.2.0)'
        required: true
        type: string

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    name: Build AppImage
    # ubuntu-22.04 (glibc 2.35) keeps the AppImage compatible with a wider
    # range of distros than ubuntu-latest (24.04, glibc 2.39).
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          # imagemagick — generates the icon inside build.sh
          # yad         — bundled into the AppImage so GUI mode works on targets
          #               that don't have yad installed
          # libfuse2    — defensive; build.sh uses --appimage-extract-and-run
          #               so FUSE is usually not required on the runner
          sudo apt-get install -y --no-install-recommends \
            imagemagick yad libfuse2

      # ── 3. Build ──────────────────────────────────────────────────────────
      - name: Build AppImage
        run: bash appimage/build.sh

      # ── 4. Resolve tag name ───────────────────────────────────────────────
      # For tag-push events github.ref_name is the tag; for workflow_dispatch
      # we use the user-supplied input.
      - name: Resolve release tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      # ── 5. Version consistency check ──────────────────────────────────────
      # Ensure the git tag (e.g. v1.2.3) matches SCRIPT_VERSION in the script.
      - name: Verify tag matches SCRIPT_VERSION
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          SCRIPT_VER="$(grep -o 'SCRIPT_VERSION="[^"]*"' reshade-linux.sh | grep -o '[0-9][^"]*')"
          TAG_VER="${TAG#v}"
          if [[ "$TAG_VER" != "$SCRIPT_VER" ]]; then
            echo "::error::Tag '$TAG' does not match SCRIPT_VERSION '$SCRIPT_VER' in reshade-linux.sh"
            echo "Bump SCRIPT_VERSION in reshade-linux.sh to '$TAG_VER' before tagging."
            exit 1
          fi
          echo "Version check passed: $TAG matches SCRIPT_VERSION=$SCRIPT_VER"

      # ── 6. Locate the built AppImage ──────────────────────────────────────
      - name: Locate AppImage
        id: asset
        run: |
          file="$(ls reshade-linux-*.AppImage | head -1)"
          echo "path=$file" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$file")" >> "$GITHUB_OUTPUT"

      # ── 7. Write release notes to a file ─────────────────────────────────
      # Using a separate file avoids embedding multi-line markdown inside a
      # YAML block scalar, which requires every line to be indented at the
      # block level (blank or zero-indented content lines break YAML parsing).
      - name: Write release notes
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          ASSET_NAME="${{ steps.asset.outputs.name }}"
          {
            echo "## reshade-linux ${TAG}"
            echo ""
            echo "Portable AppImage built automatically by GitHub Actions."
            echo ""
            echo "### What's included"
            echo "- \`reshade-linux.sh\` — the installer/updater script"
            echo "- \`yad\` binary bundled — GUI mode works without installing \`yad\` on the target machine"
            echo "- GTK3 / GLib / X11 are **not** bundled (universally present on desktop distros)"
            echo ""
            echo "### Usage"
            echo "\`\`\`bash"
            echo "chmod +x ${ASSET_NAME}"
            echo "./${ASSET_NAME}"
            echo "\`\`\`"
            echo ""
            echo "Requires: bash ≥ 4.4, GTK 3, Wine or Proton, curl, git."
          } > release-notes.md

      # ── 8. Create release + upload asset ─────────────────────────────────
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          ASSET="${{ steps.asset.outputs.path }}"
          ASSET_NAME="${{ steps.asset.outputs.name }}"
          gh release create "$TAG" \
            --title "reshade-linux $TAG" \
            --notes-file release-notes.md \
            "$ASSET#$ASSET_NAME" \
            || gh release upload "$TAG" "$ASSET#$ASSET_NAME" --clobber
